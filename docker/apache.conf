<VirtualHost *:__PORT__>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public

    # Serve coverage report as static files (bypass Symfony)
    Alias /coverage /var/www/html/public/coverage
    <Directory /var/www/html/public/coverage>
        AllowOverride None
        Require all granted
        Options Indexes FollowSymLinks
        DirectoryIndex index.html
    </Directory>

    <Directory /var/www/html/public>
        AllowOverride None
        Require all granted

        # Symfony front controller
        FallbackResource /index.php
    </Directory>

    # Disable .htaccess for performance
    <Directory /var/www/html>
        AllowOverride None
    </Directory>

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
